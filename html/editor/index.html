<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loadscreen Editor</title>
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="editor-root" class="hidden">
        <!-- ─── Top Toolbar ─────────────────────────────── -->
        <div id="toolbar">
            <div class="toolbar-left">
                <button id="btn-back" class="toolbar-btn" data-i18n-title="back" title="Zurück zur Liste">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <span id="design-name" class="design-name">Untitled</span>
                <span id="save-status" class="save-status"></span>
            </div>
            <div class="toolbar-center">
                <button id="btn-undo" class="toolbar-btn" data-i18n-title="undo" title="Rückgängig (Ctrl+Z)" disabled>
                    <i class="fa-solid fa-rotate-left"></i>
                </button>
                <button id="btn-redo" class="toolbar-btn" data-i18n-title="redo" title="Wiederholen (Ctrl+Y)" disabled>
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
                <div class="toolbar-separator"></div>
                <div class="zoom-controls">
                    <button id="btn-zoom-out" class="toolbar-btn" title="Verkleinern"><i class="fa-solid fa-minus"></i></button>
                    <span id="zoom-level">100%</span>
                    <button id="btn-zoom-in" class="toolbar-btn" title="Vergrößern"><i class="fa-solid fa-plus"></i></button>
                    <button id="btn-zoom-fit" class="toolbar-btn" title="Einpassen"><i class="fa-solid fa-expand"></i></button>
                </div>
                <div class="toolbar-separator"></div>
                <button id="btn-preview" class="toolbar-btn" title="Vorschau" data-i18n-title="preview">
                    <i class="fa-solid fa-eye"></i> <span data-i18n="preview">Vorschau</span>
                </button>
                <button id="btn-grid" class="toolbar-btn" title="Raster umschalten">
                    <i class="fa-solid fa-border-all"></i>
                </button>
            </div>
            <div class="toolbar-right">
                <div id="collaborators" class="collaborators"></div>
                <button id="btn-lang" class="toolbar-btn" title="DE / EN" style="font-size:12px;font-weight:600;min-width:36px">
                    DE
                </button>
                <button id="btn-save" class="toolbar-btn primary" title="Speichern (Ctrl+S)">
                    <i class="fa-solid fa-floppy-disk"></i> <span data-i18n="save">Speichern</span>
                </button>
                <button id="btn-deploy" class="toolbar-btn success" title="Als Loadscreen aktivieren">
                    <i class="fa-solid fa-rocket"></i> <span data-i18n="deploy">Deploy</span>
                </button>
                <button id="btn-close" class="toolbar-btn" data-i18n-title="close" title="Schließen">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>

        <!-- ─── Main Layout ─────────────────────────────── -->
        <div id="editor-body">
            <!-- Left: Element Palette -->
            <div id="palette-panel" class="side-panel left-panel">
                <div class="panel-header">
                    <i class="fa-solid fa-shapes"></i> <span data-i18n="elements">Elemente</span>
                </div>
                <div class="panel-search">
                    <input type="text" id="palette-search" data-i18n-ph="searchElements" placeholder="Element suchen...">
                </div>
                <div id="palette-categories" class="palette-categories"></div>
            </div>

            <!-- Center: Canvas -->
            <div id="canvas-wrapper">
                <div id="canvas-viewport">
                    <div id="canvas" tabindex="0">
                        <div id="canvas-grid"></div>
                        <div id="selection-box" class="hidden"></div>
                        <div id="snap-guides"></div>
                        <div id="cursor-layer"></div>
                    </div>
                </div>
            </div>

            <!-- Right: Properties + Layers -->
            <div id="right-panel" class="side-panel right-panel">
                <!-- Properties Inspector -->
                <div id="properties-panel">
                    <div class="panel-header">
                        <i class="fa-solid fa-sliders"></i> <span data-i18n="properties">Eigenschaften</span>
                    </div>
                    <div id="properties-content" class="panel-body">
                        <div class="empty-state">Wähle ein Element aus</div>
                    </div>
                </div>
                <!-- Layer Panel -->
                <div id="layers-panel">
                    <div class="panel-header">
                        <i class="fa-solid fa-layer-group"></i> <span data-i18n="layers">Ebenen</span>
                        <div class="panel-actions">
                            <button id="btn-layer-up" class="mini-btn" title="Nach oben"><i class="fa-solid fa-chevron-up"></i></button>
                            <button id="btn-layer-down" class="mini-btn" title="Nach unten"><i class="fa-solid fa-chevron-down"></i></button>
                            <button id="btn-layer-delete" class="mini-btn danger" title="Löschen"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                    <div id="layers-list" class="panel-body"></div>
                </div>
            </div>
        </div>

        <!-- ─── Design List Overlay ─────────────────────── -->
        <div id="design-list-overlay" class="overlay">
            <div class="overlay-content design-list-content">
                <div class="overlay-header">
                    <h2><i class="fa-solid fa-palette"></i> <span data-i18n="designs.title">Loadscreen Designs</span></h2>
                    <button id="btn-new-design" class="btn primary">
                        <i class="fa-solid fa-plus"></i> <span data-i18n="designs.new">Neues Design</span>
                    </button>
                </div>
                <div id="design-grid" class="design-grid"></div>
                <div class="overlay-footer">
                    <button id="btn-close-overlay" class="btn ghost" data-i18n="close">Schließen</button>
                </div>
            </div>
        </div>

        <!-- ─── Preview Overlay ─────────────────────────── -->
        <div id="preview-overlay" class="overlay hidden">
            <div id="preview-canvas" class="preview-canvas"></div>
            <button id="btn-close-preview" class="preview-close-btn">
                <i class="fa-solid fa-xmark"></i> <span data-i18n="closePreview">Vorschau schließen</span>
            </button>
        </div>

        <a class="powered-by-ui" href="https://weko-web.de/argusadmin" target="_blank" rel="noopener noreferrer">Powered by WebCom</a>
    </div>

    <script src="js/nui-bridge.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/state.js"></script>
    <script src="js/history.js"></script>
    <script src="js/elements.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/palette.js"></script>
    <script src="js/properties.js"></script>
    <script src="js/toolbar.js"></script>
    <script src="js/layers.js"></script>
    <script src="js/drag-drop.js"></script>
    <script src="js/resize.js"></script>
    <script src="js/media-manager.js"></script>
    <script src="js/collaboration.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
