<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <title>Loadscreen</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@400;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&family=Montserrat:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;600;700&family=Orbitron:wght@400;500;700;900&family=Oswald:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&family=Rajdhani:wght@300;400;500;600;700&family=Raleway:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700;900&family=Russo+One&family=Teko:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loadscreen-canvas"></div>

    <!-- Powered by WebCom -->
    <div id="powered-by" style="position:fixed;left:50%;bottom:12px;transform:translateX(-50%);z-index:9999;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;color:rgba(255,255,255,0.35);pointer-events:none;letter-spacing:0.18em;">Powered by <span style="font-weight:800;color:rgba(255,255,255,0.52)">WebCom</span></div>

    <!-- Default fallback (shown when no design is active) -->
    <div id="fallback-screen">
        <div class="fallback-spinner"></div>
        <p class="fallback-text">Loading...</p>
        <div class="fallback-progress">
            <div class="fallback-progress-bar" id="fallback-bar"></div>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/variables.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/renderer.js"></script>
</body>
</html>
